<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>无序的生活</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="disorder-page">
    <main class="disorder-shell">
      <p class="eyebrow">场景切换</p>
      <h1>无序的生活</h1>
      <p>
        不把它做成过分黑暗，而是做成一种从“有序”滑向“失序”的象征过程：先跌落、再失衡，最后来到一种更原始、更拥挤的生存环境。
      </p>

      <section class="fall-scene" aria-label="失序跌落过程">
        <div class="fall-stage-tabs" id="fall-stage-tabs" aria-hidden="true">
          <span class="stage-tab is-active">失重</span>
          <span class="stage-tab">失衡</span>
          <span class="stage-tab">拥挤</span>
          <span class="stage-tab">竞争</span>
          <span class="stage-tab">丛林</span>
        </div>

        <div class="fall-stage-text" id="fall-stage-text">从有序高处开始下坠</div>

        <div class="fall-visual stage-0" id="fall-visual">
          <div class="fall-sky"></div>
          <div class="fall-city"></div>
          <div class="fall-glow"></div>
          <div class="fall-jungle"></div>
          <div class="fall-vines"></div>
          <div class="fall-speedlines" aria-hidden="true">
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
          </div>
          <div class="fall-words" aria-hidden="true">
            <span class="fall-word word-1">秩序脱轨</span>
            <span class="fall-word word-2">边界松动</span>
            <span class="fall-word word-3">关系拥挤</span>
            <span class="fall-word word-4">即时反应</span>
            <span class="fall-word word-5">丛林法则</span>
          </div>
          <div class="watch-eyes" aria-hidden="true">
            <span class="eye eye-1"></span>
            <span class="eye eye-2"></span>
            <span class="eye eye-3"></span>
            <span class="eye eye-4"></span>
            <span class="eye eye-5"></span>
            <span class="eye eye-6"></span>
          </div>
          <div class="fall-person" aria-hidden="true">
            <span class="person-head"></span>
            <span class="person-body"></span>
          </div>
          <div class="impact-ring" aria-hidden="true"></div>
        </div>
      </section>

      <section class="disorder-grid" aria-label="无序生活的表现">
        <article class="disorder-card">
          <h2>节奏被打乱</h2>
          <p>计划不再稳定推进，时间被零碎事件不断切割。</p>
        </article>
        <article class="disorder-card">
          <h2>关系变拥挤</h2>
          <p>人与人之间不再清晰分层，而是进入更近距离的摩擦与消耗。</p>
        </article>
        <article class="disorder-card">
          <h2>判断更仓促</h2>
          <p>在不确定环境里，很多决定开始偏向即时反应，而非长期安排。</p>
        </article>
        <article class="disorder-card">
          <h2>进入丛林法则</h2>
          <p>最终落到一种更原始的环境：资源稀缺、边界模糊、四周充满审视目光。</p>
        </article>
      </section>

      <a class="disorder-link" href="./index.html">返回有序结构</a>
    </main>

    <script src="./disorder.js"></script>
  </body>
</html>
